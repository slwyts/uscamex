<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>USCAMEX Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">U</div>
          <div>
            <h1>USCAMEX</h1>
            <p>运营后台</p>
          </div>
        </div>
        <nav class="nav-list">
          <a href="#overview">运营总览</a>
          <a href="#chain">交易与入金</a>
          <a href="#protocol">业务参数</a>
          <a href="#offchain">后台服务</a>
          <a href="#settings">连接信息</a>
        </nav>
      </aside>

      <main class="content">
        <section class="topbar">
          <div>
            <span class="eyebrow">BSC 主网</span>
            <h2>项目方运营后台</h2>
          </div>
          <div class="topbar-actions">
            <button id="refreshAll">刷新全部</button>
            <button id="signAdmin">重新授权</button>
          </div>
        </section>

        <section class="status-grid hero-status">
          <div><span>当前钱包</span><strong id="walletStatus">自动连接中</strong></div>
          <div><span>管理权限</span><strong id="authStatus">等待钱包确认</strong></div>
          <div><span>合约 Owner</span><strong id="ownerStatus">-</strong></div>
          <div><span>同步状态</span><strong id="syncStatus">待刷新</strong></div>
        </section>

        <section class="panel" id="overview">
          <div class="panel-header">
            <h3>运营总览</h3>
            <div>
              <button id="loadChain">刷新链上</button>
              <button id="loadOffchain">刷新后台</button>
            </div>
          </div>
          <div class="metric-grid">
            <div><span>交易池</span><strong id="pairValue">-</strong></div>
            <div><span>回购金库</span><strong id="vaultValue">-</strong></div>
            <div><span>后台执行钱包</span><strong id="operatorValue">-</strong></div>
            <div><span>买入开关</span><strong id="buyEnabledValue">-</strong></div>
            <div><span>买入手续费</span><strong id="buyTaxValue">-</strong></div>
            <div><span>卖出手续费</span><strong id="sellTaxValue">-</strong></div>
            <div><span>单笔入金范围</span><strong id="depositRangeValue">-</strong></div>
            <div><span>后台服务</span><strong id="serviceStatusValue">待连接</strong></div>
            <div><span>最新区块</span><strong id="chainHeadValue">-</strong></div>
            <div><span>待执行任务</span><strong id="pendingValue">-</strong></div>
            <div><span>数据快照</span><strong id="dbSnapshotValue">-</strong></div>
          </div>
          <pre id="offchainOverview" class="output output-small">后台明细待加载</pre>
        </section>

        <section class="panel" id="chain">
          <div class="panel-header">
            <h3>交易和入金设置</h3>
            <div>
              <button id="initializeLp">首次注入底池</button>
              <button id="applyConfig">保存链上设置</button>
            </div>
          </div>
          <div class="form-grid">
            <label>
              后台执行钱包
              <input id="nextOperator" placeholder="0x..." />
            </label>
            <label>
              买入手续费 %
              <input id="nextBuyTax" value="3" />
            </label>
            <label>
              卖出手续费 %
              <input id="nextSellTax" value="10" />
            </label>
            <label>
              单笔最小入金 BNB
              <input id="nextMinDeposit" value="0.1" />
            </label>
            <label>
              单笔最大入金 BNB
              <input id="nextMaxDeposit" value="5" />
            </label>
            <label class="checkbox-row">
              <input id="nextBuyEnabled" type="checkbox" />
              开放 Pancake 买入
            </label>
          </div>
        </section>

        <section class="panel" id="protocol">
          <div class="panel-header">
            <h3>业务参数</h3>
            <div>
              <button id="loadProtocolConfig">刷新参数</button>
              <button id="saveProtocolConfig">保存业务参数</button>
            </div>
          </div>
          <div class="service-summary" id="protocolConfigSummary">业务参数从数据库自动初始化</div>

          <div class="subsection-title">入金分配</div>
          <div class="form-grid">
            <label>单笔最小入金 BNB<input id="configMinDeposit" value="0.1" /></label>
            <label>单笔最大入金 BNB<input id="configMaxDeposit" value="5" /></label>
            <label>组建 LP %<input id="configLpBuild" value="60" /></label>
            <label>节点分红 %<input id="configNode" value="10" /></label>
            <label>建设者买入 %<input id="configBuilderBuy" value="10" /></label>
            <label>回购金库 %<input id="configVault" value="10" /></label>
            <label>直推池 %<input id="configDirectPool" value="10" /></label>
            <label>直推实际发放 %<input id="configDirectReward" value="10" /></label>
          </div>

          <div class="subsection-title">收益与出局</div>
          <div class="form-grid">
            <label>每日静态收益 %<input id="configDailyStatic" value="0.8" /></label>
            <label>每日结算次数<input id="configPeriodsPerDay" value="4" /></label>
            <label>出局收益上限 %<input id="configExitMultiple" value="300" /></label>
          </div>
          <div class="team-grid">
            <label>1代 %<input id="configTeam1" value="10" /></label>
            <label>2代 %<input id="configTeam2" value="9" /></label>
            <label>3代 %<input id="configTeam3" value="8" /></label>
            <label>4代 %<input id="configTeam4" value="7" /></label>
            <label>5代 %<input id="configTeam5" value="6" /></label>
            <label>6代 %<input id="configTeam6" value="5" /></label>
            <label>7代 %<input id="configTeam7" value="5" /></label>
            <label>8代 %<input id="configTeam8" value="5" /></label>
            <label>9代 %<input id="configTeam9" value="5" /></label>
            <label>10代 %<input id="configTeam10" value="5" /></label>
          </div>

          <div class="subsection-title">通缩与回购</div>
          <div class="form-grid">
            <label>每小时通缩 %<input id="configDeflationHourly" value="0.1" /></label>
            <label>每日通缩上限 %<input id="configDeflationDailyCap" value="2" /></label>
            <label>每分钟回购 BNB<input id="configBuybackPerMinute" value="0.1" /></label>
            <label class="checkbox-row"><input id="configDeflationEnabled" type="checkbox" checked /> 开启 LP 通缩</label>
            <label class="checkbox-row"><input id="configBuybackEnabled" type="checkbox" checked /> 开启回购销毁</label>
          </div>

          <div class="subsection-title">税费分配</div>
          <div class="form-grid">
            <label>买入税建设者 %<input id="configBuyTaxBuilder" value="1" /></label>
            <label>买入税回购 %<input id="configBuyTaxVault" value="2" /></label>
            <label>卖出税建设者 %<input id="configSellTaxBuilder" value="3" /></label>
            <label>卖出税生态 %<input id="configSellTaxOwner" value="3" /></label>
            <label>卖出税回购 %<input id="configSellTaxVault" value="4" /></label>
          </div>
        </section>

        <section class="panel" id="offchain">
          <div class="panel-header">
            <h3>后台服务</h3>
            <div>
              <button id="loadState">查看用户账本</button>
              <button id="loadJournal">查看执行队列</button>
            </div>
          </div>
          <div class="service-summary" id="offchainSummary">后台服务待刷新</div>
          <pre id="stateOutput" class="output">用户账本待加载</pre>
        </section>

        <section class="panel" id="journal">
          <div class="panel-header">
            <h3>执行队列</h3>
          </div>
          <pre id="journalOutput" class="output">执行队列待加载</pre>
        </section>

        <section class="panel technical-settings" id="settings">
          <div class="panel-header">
            <h3>连接信息</h3>
            <button id="saveSettings">保存连接信息</button>
          </div>
          <div class="form-grid compact-form">
            <label>
              BSC RPC
              <input id="rpcUrl" value="https://bsc-dataseed.binance.org" />
            </label>
            <label>
              Chain ID
              <input id="chainId" value="56" />
            </label>
            <label>
              Token 合约
              <input id="tokenAddress" value="0x0000000000000000000000000000000000000000" />
            </label>
            <label>
              后台 API
              <input id="apiBase" value="http://127.0.0.1:8787" />
            </label>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
